<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dados 3D — RPG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=EB+Garamond:ital@0;1&family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="src/style.css"/>
</head>
<body>
<a class="skip-link" href="#table-stage">Pular para o conteúdo</a>

<!-- Overlay de revelação mágica -->
<div class="reveal-overlay" id="reveal-overlay">
  <div class="reveal-card">
    <div class="reveal-sparkles" id="reveal-sparkles"></div>
    <p class="reveal-subtitle" id="reveal-subtitle"></p>
    <div class="reveal-number" id="reveal-number">20</div>
    <p class="reveal-label">Total</p>
  </div>
</div>

<div class="page-shell">
  <header class="topbar">
    <div class="brand">
      <div class="brand__logo">
        <svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="2.4">
          <polygon points="20,4 36,13 36,27 20,36 4,27 4,13" stroke-linejoin="round"/>
          <line x1="20" y1="4" x2="20" y2="36"/><line x1="4" y1="13" x2="36" y2="13"/><line x1="4" y1="27" x2="36" y2="27"/>
        </svg>
      </div>
      <div>
        <p class="eyebrow">Mesa virtual</p>
        <h1>Dados 3D RPG</h1>
      </div>
    </div>
    <button class="primary-button" id="roll-selected">Rolar dados</button>
  </header>

  <div class="layout">
    <aside class="sidebar">

      <section class="panel panel--glow">
        <div class="panel__header"><h2>Tipo de dado</h2></div>
        <div class="dice-grid">
          <button class="dice-button" data-dice="d4"  aria-pressed="false"><img class="dice-icon" src="src/dice/d4.png"  alt=""/><span>d4</span></button>
          <button class="dice-button" data-dice="d6"  aria-pressed="false"><img class="dice-icon" src="src/dice/d6.png"  alt=""/><span>d6</span></button>
          <button class="dice-button" data-dice="d8"  aria-pressed="false"><img class="dice-icon" src="src/dice/d8.png"  alt=""/><span>d8</span></button>
          <button class="dice-button" data-dice="d10" aria-pressed="false"><img class="dice-icon" src="src/dice/d10.png" alt=""/><span>d10</span></button>
          <button class="dice-button" data-dice="d12" aria-pressed="false"><img class="dice-icon" src="src/dice/d12.png" alt=""/><span>d12</span></button>
          <button class="dice-button" data-dice="d20" aria-pressed="false"><img class="dice-icon" src="src/dice/d20.png" alt=""/><span>d20</span></button>
        </div>
      </section>

      <section class="panel">
        <div class="panel__header" style="display:flex;justify-content:space-between;align-items:center">
          <h2>Pool de dados</h2>
          <button class="clear-btn" id="pool-clear">Limpar</button>
        </div>
        <div class="pool-chips" id="pool-chips">
          <p class="pool-empty" id="pool-empty">Clique nos dados acima para adicionar</p>
        </div>
      </section>

      <section class="result-card" id="result-section">
        <p class="result-card__label">Resultado</p>
        <div class="dice-results-grid" id="dice-results-grid">
          <p class="no-result">Nenhuma rolagem ainda</p>
        </div>
        <div class="result-total-row" id="result-total-row" style="display:none">
          <span class="result-total-label">Total</span>
          <span id="result-total-val" class="result-big-total">0</span>
        </div>
      </section>

    </aside>

    <main class="table-stage" id="table-stage">
      <div class="canvas-shell">
        <canvas id="dice-canvas"></canvas>
        <div class="canvas-overlay">
          <span class="status-dot"></span>
          <span id="engine-status">Inicializando…</span>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="src/app.js"></script>
</body>
</html>
