<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dados 3D — RPG</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/three@0.166.1/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;min-height:100vh}
body{
  font-family:'Inter',sans-serif;
  background: #080a14;
  background-image:
    radial-gradient(ellipse 80% 40% at 50% -10%, rgba(99,120,200,.22) 0%, transparent 70%),
    radial-gradient(ellipse 60% 30% at 50% 110%, rgba(180,140,60,.12) 0%, transparent 70%);
  color:#e8e2d8;
  font-size:15px;
}
button,input{font:inherit;cursor:pointer}
svg,canvas{display:block}

/* ── Topbar ─────────────────────────────────── */
.topbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:.9rem 1.5rem;
  border-bottom:1px solid rgba(193,203,255,.08);
  background:rgba(8,10,20,.72);
  backdrop-filter:blur(20px);
  position:sticky;top:0;z-index:30;
}
.brand{display:flex;align-items:center;gap:.85rem}
.brand-icon{
  width:2.6rem;height:2.6rem;border-radius:.75rem;
  display:grid;place-items:center;
  background:linear-gradient(145deg,rgba(209,181,116,.18),rgba(18,22,40,.9));
  border:1px solid rgba(209,181,116,.22);
  color:#d1b574;
  box-shadow:0 0 20px rgba(209,181,116,.1);
}
.brand-icon svg{width:1.4rem;height:1.4rem}
.brand-text small{
  display:block;text-transform:uppercase;
  letter-spacing:.12em;font-size:.65rem;color:rgba(187,183,201,.55);
  margin-bottom:.1rem;
}
.brand-text strong{
  font-family:'Cinzel',serif;
  font-size:1.1rem;font-weight:700;
  letter-spacing:.02em;color:#f0e9df;
}
.btn-roll-top{
  padding:.55rem 1.4rem;
  background:linear-gradient(135deg,rgba(123,145,201,.9),rgba(80,104,172,.9));
  color:#fff;border:1px solid rgba(123,145,201,.3);
  border-radius:.75rem;font-weight:600;font-size:.9rem;
  box-shadow:0 0 24px rgba(100,120,200,.25);
  transition:transform 150ms,box-shadow 150ms;
}
.btn-roll-top:hover{transform:translateY(-1px);box-shadow:0 4px 24px rgba(100,120,200,.4)}

/* ── Layout ─────────────────────────────────── */
.layout{
  display:grid;
  grid-template-columns:280px 1fr;
  gap:0;
  min-height:calc(100vh - 57px);
}

/* ── Sidebar ────────────────────────────────── */
.sidebar{
  border-right:1px solid rgba(193,203,255,.07);
  padding:1.25rem 1rem;
  display:flex;flex-direction:column;gap:1rem;
  background:rgba(10,12,22,.5);
}
.sec-label{
  text-transform:uppercase;letter-spacing:.12em;
  font-size:.62rem;color:rgba(187,183,201,.4);
  margin:0 0 .6rem .1rem;
}
.panel{
  background:rgba(18,22,40,.55);
  border:1px solid rgba(193,203,255,.08);
  border-radius:1.1rem;padding:1rem;
}
.panel h2{
  font-family:'Cinzel',serif;
  font-size:.95rem;font-weight:700;
  color:#e8e2d8;margin:0 0 .85rem;
  letter-spacing:.02em;
}

/* Dice grid */
.dice-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:.45rem;
}
.dice-btn{
  padding:.65rem .4rem;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(193,203,255,.1);
  border-radius:.65rem;
  color:#c8c0b0;font-weight:700;font-size:.95rem;
  transition:all 150ms;
}
.dice-btn:hover{
  background:rgba(209,181,116,.1);
  border-color:rgba(209,181,116,.3);
  color:#d1b574;
  transform:translateY(-1px);
}
.dice-btn.active{
  background:rgba(209,181,116,.12);
  border-color:rgba(209,181,116,.5);
  color:#d1b574;
  box-shadow:0 0 16px rgba(209,181,116,.15);
}

/* Notation */
.notation-field{
  display:flex;flex-direction:column;gap:.5rem;
}
.notation-field label{
  font-size:.78rem;color:rgba(187,183,201,.55);
}
.notation-field input{
  padding:.6rem .85rem;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(193,203,255,.12);
  border-radius:.65rem;color:#e8e2d8;
  transition:border-color 150ms;
}
.notation-field input:focus{
  outline:none;border-color:rgba(123,145,201,.45);
  background:rgba(123,145,201,.06);
}
.btn-exec{
  padding:.6rem;border-radius:.65rem;
  background:rgba(123,145,201,.15);
  border:1px solid rgba(123,145,201,.2);
  color:#aab8e0;font-weight:600;font-size:.82rem;
  transition:all 150ms;
}
.btn-exec:hover{background:rgba(123,145,201,.25);color:#c0ccec}

/* Result */
.result-panel{
  background:linear-gradient(160deg,rgba(209,181,116,.06),rgba(100,120,200,.08));
  border:1px solid rgba(209,181,116,.1);
  border-radius:1.1rem;padding:1rem;
}
.result-panel h2{font-family:'Cinzel',serif;font-size:.95rem;color:#e8e2d8;margin:0 0 .75rem}
.result-rolls{
  font-family:'Cinzel',serif;
  font-size:1.7rem;font-weight:700;
  color:#d1b574;line-height:1.1;
  min-height:2.2rem;letter-spacing:.04em;
  word-break:break-all;
}
.result-total{
  margin-top:.4rem;
  font-size:.85rem;color:rgba(187,183,201,.6);
  font-family:'EB Garamond',serif;
}

/* ── Canvas area ────────────────────────────── */
.stage{
  display:flex;flex-direction:column;
  background:transparent;
}
.canvas-wrap{
  flex:1;
  position:relative;
  background:
    radial-gradient(ellipse 70% 50% at 50% 30%,rgba(100,120,200,.1),transparent 70%),
    linear-gradient(180deg,#0d1020 0%,#080a14 100%);
  min-height:calc(100vh - 57px);
  overflow:hidden;
}
#dice-canvas{
  width:100%;height:100%;position:absolute;inset:0;
  display:block;
}
.canvas-floor{
  position:absolute;bottom:0;left:0;right:0;
  height:180px;
  background:linear-gradient(to top,rgba(8,10,20,.9),transparent);
  pointer-events:none;
}
.status-pill{
  position:absolute;bottom:1.25rem;left:50%;
  transform:translateX(-50%);
  display:flex;align-items:center;gap:.5rem;
  padding:.45rem 1rem;
  background:rgba(8,10,20,.8);
  border:1px solid rgba(193,203,255,.1);
  border-radius:999px;
  backdrop-filter:blur(12px);
  font-size:.78rem;color:rgba(187,183,201,.7);
  white-space:nowrap;
  pointer-events:none;
}
.sdot{
  width:.5rem;height:.5rem;border-radius:50%;
  background:#8fdf88;
  box-shadow:0 0 0 4px rgba(143,223,136,.12);
  flex-shrink:0;
  transition:background .3s;
}
.sdot.rolling{background:#d1b574;box-shadow:0 0 0 4px rgba(209,181,116,.16)}

@media(max-width:860px){
  .layout{grid-template-columns:1fr}
  .sidebar{border-right:none;border-bottom:1px solid rgba(193,203,255,.07)}
  .canvas-wrap{min-height:60vw}
}
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="20,4 36,13 36,27 20,36 4,27 4,13" stroke-linejoin="round"/>
        <line x1="20" y1="4" x2="20" y2="36"/>
        <line x1="4" y1="13" x2="36" y2="13"/>
        <line x1="4" y1="27" x2="36" y2="27"/>
      </svg>
    </div>
    <div class="brand-text">
      <small>Biblioteca Arcana</small>
      <strong>Dados 3D RPG</strong>
    </div>
  </div>
  <button class="btn-roll-top" id="btn-top-roll">Rolar d20</button>
</header>

<div class="layout">
  <aside class="sidebar">

    <div class="panel">
      <h2>Tipo de dado</h2>
      <div class="dice-grid">
        <button class="dice-btn" data-dice="d4">d4</button>
        <button class="dice-btn" data-dice="d6">d6</button>
        <button class="dice-btn" data-dice="d8">d8</button>
        <button class="dice-btn" data-dice="d10">d10</button>
        <button class="dice-btn" data-dice="d12">d12</button>
        <button class="dice-btn" data-dice="d20">d20</button>
      </div>
    </div>

    <div class="panel">
      <h2>Expressão</h2>
      <div class="notation-field">
        <label for="notation-input">Ex: 2d6+3 · 1d20 · 4d8-2</label>
        <input id="notation-input" type="text" value="1d20" spellcheck="false" />
        <button class="btn-exec" id="btn-exec">Executar expressão</button>
      </div>
    </div>

    <div class="result-panel">
      <h2>Resultado</h2>
      <div class="result-rolls" id="roll-display">—</div>
      <div class="result-total" id="roll-total">Nenhuma rolagem ainda</div>
    </div>

  </aside>

  <div class="stage">
    <div class="canvas-wrap">
      <canvas id="dice-canvas"></canvas>
      <div class="canvas-floor"></div>
      <div class="status-pill">
        <span class="sdot" id="sdot"></span>
        <span id="status-msg">Inicializando…</span>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';

  /* ── DOM refs ─────────────────────────────── */
  var notInput   = document.getElementById('notation-input');
  var rollDisp   = document.getElementById('roll-display');
  var rollTotal  = document.getElementById('roll-total');
  var diceBtns   = document.querySelectorAll('.dice-btn');
  var btnTopRoll = document.getElementById('btn-top-roll');
  var btnExec    = document.getElementById('btn-exec');
  var statusMsg  = document.getElementById('status-msg');
  var sdot       = document.getElementById('sdot');
  var canvas     = document.getElementById('dice-canvas');

  var SIDES = {d4:4,d6:6,d8:8,d10:10,d12:12,d20:20};
  var S = {sel:'d20', renderer:null, scene:null, camera:null, dice:[], world:null, rolling:false};

  /* ── Helpers ──────────────────────────────── */
  function setStatus(msg, state){
    statusMsg.textContent = msg;
    sdot.className = 'sdot' + (state === 'rolling' ? ' rolling' : '');
  }

  function parseNotation(raw){
    var m = raw.trim().toLowerCase().match(/^(\d*)d(\d+)([+-]\d+)?$/);
    if(!m) return null;
    return {count: +(m[1]||1), sides: +m[2], mod: +(m[3]||0)};
  }

  function rollDie(s){ return Math.floor(Math.random()*s)+1; }

  function runNotation(expr){
    var p = parseNotation(expr);
    if(!p){ setStatus('Formato inválido — use: 2d6+3'); return; }
    var rolls = [], i;
    for(i=0;i<p.count;i++) rolls.push(rollDie(p.sides));
    var total = rolls.reduce(function(a,b){return a+b;},0) + p.mod;
    rollDisp.textContent = rolls.join(' + ');
    rollTotal.textContent = 'Total: ' + total + (p.mod ? (p.mod>0?' (+'+p.mod+')':' ('+p.mod+')'): '');
    throwDice(p.count, p.sides);
  }

  function selectDie(die){
    S.sel = die;
    document.getElementById('btn-top-roll').textContent = 'Rolar ' + die;
    diceBtns.forEach(function(b){
      b.classList.toggle('active', b.dataset.dice === die);
    });
  }

  /* ── Geometria ────────────────────────────── */
  function geomFor(sides){
    if(sides===4)  return new THREE.TetrahedronGeometry(0.95);
    if(sides===6)  return new THREE.BoxGeometry(1.2,1.2,1.2);
    if(sides===8)  return new THREE.OctahedronGeometry(0.95);
    if(sides===10) return new THREE.CylinderGeometry(0.7,0.7,1.15,10);
    if(sides===12) return new THREE.DodecahedronGeometry(0.88);
    return new THREE.IcosahedronGeometry(0.95);
  }

  function makeMat(){
    return new THREE.MeshStandardMaterial({
      color:0xd4b96a, roughness:0.28, metalness:0.22,
      emissive:0x1a1f38, emissiveIntensity:0.6
    });
  }

  /* ── Mundo físico ───────────────────────────── */
  function buildWorld(){
    S.world = new CANNON.World({gravity: new CANNON.Vec3(0,-24,0), allowSleep:true});
    S.world.solver.iterations = 20;
    /* Chao */
    var fl = new CANNON.Body({mass:0, shape:new CANNON.Plane()});
    fl.quaternion.setFromEuler(-Math.PI/2,0,0);
    fl.position.set(0,-1.1,0);
    S.world.addBody(fl);
    /* Paredes */
    function wall(x,z,ry){
      var b = new CANNON.Body({mass:0, shape:new CANNON.Box(new CANNON.Vec3(9,4,0.2))});
      b.position.set(x,1,z);
      b.quaternion.setFromEuler(0,ry,0);
      S.world.addBody(b);
    }
    wall(0,-5.5,0); wall(0,5.5,0);
    wall(-5.5,0,Math.PI/2); wall(5.5,0,Math.PI/2);
  }

  /* ── Dados ────────────────────────────────── */
  function clearDice(){
    S.dice.forEach(function(d){
      S.scene.remove(d.mesh);
      S.world.removeBody(d.body);
      d.mesh.geometry.dispose();
      d.mesh.material.dispose();
    });
    S.dice = [];
  }

  function spawnDice(count, sides){
    clearDice();
    var spread = Math.max(1.2, Math.min(3.6, count*0.9));
    for(var i=0;i<count;i++){
      var mesh = new THREE.Mesh(geomFor(sides), makeMat());
      var shape = (sides===6)
        ? new CANNON.Box(new CANNON.Vec3(0.6,0.6,0.6))
        : new CANNON.Sphere(0.65);
      var body = new CANNON.Body({mass:1, shape:shape, linearDamping:0.25, angularDamping:0.28, allowSleep:true});
      body.position.set(
        (Math.random()-0.5)*spread,
        5 + i*0.8,
        (Math.random()-0.5)*spread
      );
      body.quaternion.setFromEuler(
        Math.random()*Math.PI*2,
        Math.random()*Math.PI*2,
        Math.random()*Math.PI*2
      );
      mesh.position.copy(body.position);
      mesh.quaternion.copy(body.quaternion);
      S.scene.add(mesh);
      S.world.addBody(body);
      S.dice.push({mesh:mesh, body:body, sides:sides});
    }
  }

  function throwDice(count, sides){
    if(!S.world){ setStatus('Motor não inicializado'); return; }
    S.rolling = true;
    setStatus('Rolando…', 'rolling');
    spawnDice(count, sides);
    S.dice.forEach(function(d){
      var f = 6 + Math.random()*6;
      d.body.wakeUp();
      d.body.applyImpulse(
        new CANNON.Vec3((Math.random()-0.5)*f, f*0.9, (Math.random()-0.5)*f),
        d.body.position
      );
      d.body.angularVelocity.set(
        (Math.random()-0.5)*28,
        (Math.random()-0.5)*28,
        (Math.random()-0.5)*28
      );
    });
  }

  /* ── Cena Three.js ────────────────────────── */
  function initScene(){
    var wrap = canvas.parentElement;
    var W = wrap.clientWidth || window.innerWidth - 280;
    var H = wrap.clientHeight || window.innerHeight - 57;
    canvas.width  = W;
    canvas.height = H;

    var renderer = new THREE.WebGLRenderer({canvas:canvas, antialias:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
    renderer.setSize(W, H);

    var scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0c1a);

    /* Neblina sutil no fundo */
    scene.fog = new THREE.FogExp2(0x0a0c1a, 0.055);

    var camera = new THREE.PerspectiveCamera(42, W/H, 0.1, 120);
    camera.position.set(0, 8, 11);
    camera.lookAt(0, -0.5, 0);

    /* Iluminação */
    scene.add(new THREE.AmbientLight(0x8090c8, 1.4));
    var key = new THREE.DirectionalLight(0x9daee8, 3.2);
    key.position.set(6, 12, 5);
    scene.add(key);
    var rim = new THREE.DirectionalLight(0x4455aa, 1.2);
    rim.position.set(-8, 6, -4);
    scene.add(rim);
    var warm = new THREE.PointLight(0xd1a050, 32, 36, 2);
    warm.position.set(-4, 5, 3);
    scene.add(warm);

    /* Chao visual */
    var floorGeo = new THREE.CircleGeometry(6, 96);
    var floorMat = new THREE.MeshStandardMaterial({
      color:0x0f1220, roughness:0.95, metalness:0.1
    });
    var floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI/2;
    floor.position.y = -1.1;
    scene.add(floor);

    /* Circulo de luz no chao */
    var ringGeo = new THREE.RingGeometry(2.5, 2.55, 64);
    var ringMat = new THREE.MeshBasicMaterial({
      color:0x3a4a80, side:THREE.DoubleSide, transparent:true, opacity:0.35
    });
    var ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = -Math.PI/2;
    ring.position.y = -1.09;
    scene.add(ring);

    S.renderer = renderer;
    S.scene    = scene;
    S.camera   = camera;

    buildWorld();
    setStatus('Pronto — clique em um dado para rolar');
    animate();
  }

  function animate(){
    requestAnimationFrame(animate);
    if(S.world) S.world.fixedStep();
    S.dice.forEach(function(d){
      d.mesh.position.copy(d.body.position);
      d.mesh.quaternion.copy(d.body.quaternion);
    });
    if(S.rolling && S.dice.length > 0){
      var all = S.dice.every(function(d){
        return d.body.sleepState === CANNON.Body.SLEEPING;
      });
      if(all){
        S.rolling = false;
        setStatus('Dado parou — veja o resultado');
      }
    }
    if(S.renderer) S.renderer.render(S.scene, S.camera);
  }

  /* ── Resize ───────────────────────────────── */
  window.addEventListener('resize', function(){
    if(!S.renderer || !S.camera) return;
    var wrap = canvas.parentElement;
    var W = wrap.clientWidth;
    var H = wrap.clientHeight;
    if(!W || !H) return;
    S.renderer.setSize(W, H);
    S.camera.aspect = W/H;
    S.camera.updateProjectionMatrix();
  });

  /* ── Eventos ──────────────────────────────── */
  diceBtns.forEach(function(btn){
    btn.addEventListener('click', function(){
      selectDie(btn.dataset.dice);
      notInput.value = '1' + btn.dataset.dice;
      runNotation('1' + btn.dataset.dice);
    });
  });

  btnTopRoll.addEventListener('click', function(){
    runNotation('1' + S.sel);
  });

  btnExec.addEventListener('click', function(){
    runNotation(notInput.value);
  });

  notInput.addEventListener('keydown', function(e){
    if(e.key === 'Enter') runNotation(notInput.value);
  });

  /* ── Boot ─────────────────────────────────── */
  selectDie('d20');

  if(typeof THREE !== 'undefined' && typeof CANNON !== 'undefined'){
    initScene();
  } else {
    setStatus('Erro: abra com conexão à internet para carregar Three.js');
  }

})();
</script>
</body>
</html>
